apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: main-hpa
  namespace: default
spec:
  # Масштабируемый объект - указываем на наш deployment main
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: main

  # Минимальное количество реплик - 1 (гарантирует, что приложение всегда работает)
  minReplicas: 1
  # Максимальное количество реплик - 3 (ограничивает масштабирование, чтобы не исчерпать ресурсы кластера)
  maxReplicas: 3

  # Метрики, на основе которых HPA принимает решение о масштабировании
  metrics:
    # Тип метрики - Resource (стандартные ресурсы пода: CPU, memory)
    - type: Resource
      resource:
        # Имя ресурса - CPU (процессорное время)
        name: cpu
        target:
          # Тип целевого значения - Utilization (использование от запрошенных ресурсов)
          # Альтернативы: AverageValue (среднее абсолютное значение)
          type: Utilization
          # Целевое значение - 50% от requests.cpu (250m)
          # Если средняя нагрузка на все поды превысит 50% (125m), HPA начнет добавлять реплики
          averageUtilization: 50

    # Можно добавить метрику по памяти для более точного масштабирования
    # - type: Resource
    #   resource:
    #     name: memory
    #     target:
    #       type: Utilization
    #       averageUtilization: 70

  # Дополнительные настройки поведения HPA (опционально)
  behavior:
    # Настройки для увеличения количества реплик (scale up)
    scaleUp:
      # Стабилизация - сколько ждать после последнего события перед началом нового scale up
      # Предотвращает "дерганье" при кратковременных пиках нагрузки
      stabilizationWindowSeconds: 60
      # Политика увеличения
      policies:
        # Можно добавить 100% от текущих реплик (т.е. удвоить) за раз
        - type: Percent
          value: 100
          periodSeconds: 15
        # Или добавить 1 реплику за раз (что актуально для малого количества реплик)
        - type: Pods
          value: 1
          periodSeconds: 15
      # Выбирается политика, которая даст наибольшее изменение (если несколько политик)
      selectPolicy: Max

    # Настройки для уменьшения количества реплик (scale down)
    scaleDown:
      # Стабилизация при уменьшении - ждать 300 секунд (5 минут) перед уменьшением
      # Важно для приложений, где пересоздание подов дорого (например, с большими кэшами)
      stabilizationWindowSeconds: 300
      policies:
        # Можно уменьшать не более чем на 10% от текущих реплик за раз
        - type: Percent
          value: 10
          periodSeconds: 15
        # Или не более чем на 1 реплику за раз
        - type: Pods
          value: 1
          periodSeconds: 15
      # Выбирается политика, которая даст наименьшее изменение (консервативное уменьшение)
      selectPolicy: Min

---

apiVersion: v1
kind: Service
metadata:
  name: main
spec:
  type: ClusterIP # По умолчанию
  selector:
    app: main
  ports:
    - protocol: TCP # По умолчанию
      name: http-api
      port: 5001
      targetPort: 5001
    - name: actuator
      port: 5101
      targetPort: 5101

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: main
  labels:
    app: main
spec:
  minReadySeconds: 10
  strategy:
    rollingUpdate:
      maxSurge: 1 # макс сверху реплик (реплики + это)
      maxUnavailable: 1 # макс недоступных (реплики - это)
    type: RollingUpdate
  replicas: 2 # HPA приоритетнее этой настройки
  selector:
    matchLabels:
      app: main
  template:
    metadata:
      labels:
        app: main
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5101"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: main
          image: borntonight/main:1
          imagePullPolicy: Never # Не загружать из интернета
          ports:
            - containerPort: 5001
              name: http-api
            - containerPort: 5101
              name: actuator
          resources:
            requests:
              memory: "500Mi"
              cpu: "250m"
            limits:
              memory: "600Mi"
              cpu: "500m"
          livenessProbe:
            initialDelaySeconds: 90
            periodSeconds: 30
            httpGet:
              path: /actuator/health/liveness
              port: 5101
              scheme: HTTP
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            initialDelaySeconds: 15
            periodSeconds: 15
            httpGet:
              path: /actuator/health/readiness
              port: 5101
              scheme: HTTP
            timeoutSeconds: 10
            failureThreshold: 1
            successThreshold: 1
          env:
            - name: SERVICE_HOST
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: SERVICE_HOST_MAIN
            - name: SPRING_ADMIN_HOST
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: SPRING_ADMIN_HOST
            - name: SPRING_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: SPRING_ADMIN_USER
            - name: SPRING_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: SPRING_ADMIN_PASSWORD
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: POSTGRES_HOST
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: POSTGRES_PASSWORD
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: REDIS_HOST
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: REDIS_PASSWORD
            - name: JWT_KEY
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: JWT_KEY
            - name: ACCESS_TOKEN_EXPIRATION
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: ACCESS_TOKEN_EXPIRATION
            - name: REFRESH_TOKEN_EXPIRATION
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: REFRESH_TOKEN_EXPIRATION
            - name: KAFKA_HOST
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: KAFKA_HOST
            - name: KAFKA_TOPIC
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: KAFKA_TOPIC
            - name: KAFKA_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: KAFKA_CLIENT_ID
            - name: GRPC_HOST
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: GRPC_HOST
            - name: LOGSTASH_HOST
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: LOGSTASH_HOST
            - name: SWAGGER_HOST
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: SWAGGER_HOST
            - name: TASK_INCREASE_COUNT_DELAY
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: TASK_INCREASE_COUNT_DELAY
            - name: TASK_INCREASE_COUNT_INITIAL_DELAY
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: TASK_INCREASE_COUNT_INITIAL_DELAY
