apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-role-config
data:
  # appendonly - пишет операции на диск
  primary.conf: |
    bind 0.0.0.0
    port 6379
    appendonly yes
    dir /redis/data
  replica.conf: |
    replicaof redis-0.redis 6379
    bind 0.0.0.0
    port 6379
    appendonly yes
    dir /redis/data

---

apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  ports:
    - port: 6379
  clusterIP: None # headless service - не балансирует трафик, а дает прямые DNS имена подам
  selector:
    app: redis

---

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
spec:
  selector:
    matchLabels:
      app: redis
  serviceName: redis
  replicas: 2
  template:
    metadata:
      labels:
        app: redis
    spec:
      terminationGracePeriodSeconds: 10
      initContainers: # Выполняется перед основным контейнером
        - name: init-redis
          image: redis:7.4-rc
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: REDIS_PASSWORD
          command:
            - bash
            - "-c"
            - |
              set -ex
              # Извлекаем порядковый номер из имени хоста (redis-0 -> 0, redis-1 -> 1)
              # hostname в StatefulSet имеет формат: <statefulset-name>-<ordinal>
              [[ `hostname` =~ -([0-9]+)$ ]] || exit 1
              ordinal=${BASH_REMATCH[1]}
              echo "ordinal ${ordinal}"
              
              # Копируем конфиги из config-map в пустую новую директорию
              mkdir -p /redis/conf/
              
              # Выбираем правильную конфигурацию в зависимости от индекса:
              # - под с индексом 0 становится мастером (primary)
              # - все остальные поды становятся репликами (replica)
              if [[ $ordinal -eq 0 ]]; then
                cp /mnt/redis-configmap/primary.conf /redis/conf/redis.conf
              else
                cp /mnt/redis-configmap/replica.conf /redis/conf/redis.conf
              fi
              
              # Выводим конфигурацию для отладки
              cat /redis/conf/redis.conf
          volumeMounts:
            - name: redis-config-volume # Монтируем emptyDir для конфигов
              mountPath: /redis/conf/
            - name: redis-configmap-volume # Монтируем ConfigMap с конфигами
              mountPath: /mnt/redis-configmap
      # Основной контейнер с Redis сервером
      containers:
        - name: redis-container
          image: redis:7.4-rc
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: REDIS_PASSWORD
          # Запускаем redis-server с подготовленным конфигом
          command: ["redis-server"]
          args: ["/redis/conf/redis.conf"]
          volumeMounts:
            - name: redis-config-volume # Монтируем конфиг, подготовленный init-контейнером
              mountPath: /redis/conf/
            - name: redis-pvc  # Монтируем PersistentVolume для данных
              mountPath: /redis/data
          resources:
            requests:
              memory: "100Mi"
              cpu: "100m"
            limits:
              memory: "150Mi"
              cpu: "150m"
      # Общие volumes, доступные всем контейнерам в поде
      volumes:
        - name: redis-configmap-volume # Volume из ConfigMap с шаблонами конфигов
          configMap:
            name: redis-role-config
        - name: redis-config-volume # EmptyDir для временной конфигурации (живет, пока жив под)
          emptyDir: {}

  # Шаблон для создания PersistentVolume для каждого пода
  # Каждый под получит свой PVC с именем redis-pvc-<pod-name>
  volumeClaimTemplates:
    - metadata:
        name: redis-pvc
      spec:
        accessModes: [ "ReadWriteOnce" ] # Только один под может писать одновременно
        resources:
          requests:
            storage: 100Mi # Запрашиваем 100Mi дискового пространства
