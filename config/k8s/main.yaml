apiVersion: v1
kind: Service
metadata:
  name: main
spec:
  type: ClusterIP # По умолчанию
  selector:
    app: main
  ports:
    - protocol: TCP # По умолчанию
      name: http-api
      port: 5001
      targetPort: 5001
    - name: actuator
      port: 5101
      targetPort: 5101
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: main
  labels:
    app: main
spec:
  minReadySeconds: 10
  strategy:
    rollingUpdate:
      maxSurge: 1 # макс сверху реплик (реплики + это)
      maxUnavailable: 1 # макс недоступных (реплики - это)
    type: RollingUpdate
  replicas: 2
  selector:
    matchLabels:
      app: main
  template:
    metadata:
      labels:
        app: main
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5101"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: main
          image: borntonight/main:1
          imagePullPolicy: Never # Не загружать из интернета
          ports:
            - containerPort: 5001
              name: http-api
            - containerPort: 5101
              name: actuator
          resources:
            requests:
              memory: "500Mi"
              cpu: "250m"
            limits:
              memory: "600Mi"
              cpu: "500m"
          livenessProbe:
            initialDelaySeconds: 90
            periodSeconds: 30
            httpGet:
              path: /actuator/health/liveness
              port: 5101
              scheme: HTTP
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            initialDelaySeconds: 15
            periodSeconds: 15
            httpGet:
              path: /actuator/health/readiness
              port: 5101
              scheme: HTTP
            timeoutSeconds: 10
            failureThreshold: 1
            successThreshold: 1
          env:
            - name: SERVICE_HOST
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: SERVICE_HOST_MAIN
            - name: SPRING_ADMIN_HOST
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: SPRING_ADMIN_HOST
            - name: SPRING_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: SPRING_ADMIN_USER
            - name: SPRING_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: SPRING_ADMIN_PASSWORD
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: POSTGRES_HOST
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: POSTGRES_PASSWORD
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: REDIS_HOST
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: REDIS_PASSWORD
            - name: JWT_KEY
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: JWT_KEY
            - name: ACCESS_TOKEN_EXPIRATION
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: ACCESS_TOKEN_EXPIRATION
            - name: REFRESH_TOKEN_EXPIRATION
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: REFRESH_TOKEN_EXPIRATION
            - name: KAFKA_HOST
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: KAFKA_HOST
            - name: KAFKA_TOPIC
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: KAFKA_TOPIC
            - name: KAFKA_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: KAFKA_CLIENT_ID
            - name: GRPC_HOST
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: GRPC_HOST
            - name: LOGSTASH_HOST
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: LOGSTASH_HOST
            - name: SWAGGER_HOST
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: SWAGGER_HOST
            - name: TASK_INCREASE_COUNT_DELAY
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: TASK_INCREASE_COUNT_DELAY
            - name: TASK_INCREASE_COUNT_INITIAL_DELAY
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: TASK_INCREASE_COUNT_INITIAL_DELAY
